models:
  - id: logistic_regression_baseline
    algorithm: logistic_regression
    features:
      - pct_change_binance
      - time_remaining
      - spread
    min_training_rows: 1500
    max_training_rows: 100000
    retrain_every_n_candles: 1
    params:
      max_iter: 1000
      C: 1.0
      random_state: 42

  - id: logistic_regression
    algorithm: logistic_regression
    features:
      - time_remaining
      - pct_change_binance
      - pct_change_coinbase
      - pct_change_kraken
    min_training_rows: 1500
    max_training_rows: 100000
    retrain_every_n_candles: 1
    params:
      max_iter: 1000
      C: 1.0
      random_state: 42

  - id: lightgbm
    algorithm: lightgbm
    features:
      - time_remaining
      - pct_change_binance
      - pct_change_coinbase
      - pct_change_kraken
    min_training_rows: 1500
    max_training_rows: 100000
    retrain_every_n_candles: 1
    params:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 6
      num_leaves: 31
      random_state: 42

  - id: xgboost
    algorithm: xgboost
    features:
      - time_remaining
      - pct_change_binance
      - pct_change_coinbase
      - pct_change_kraken
    min_training_rows: 1500
    max_training_rows: 100000
    retrain_every_n_candles: 1
    params:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.05
      random_state: 42
