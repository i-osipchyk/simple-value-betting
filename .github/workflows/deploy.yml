name: Deploy

on:
  push:
    branches: [dev, main]
    paths:
      - "src/**"
      - "models.yaml"
      - "infra/task-definition-*.json"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod"    >> $GITHUB_OUTPUT
            echo "cluster=polymarket-prod-cluster" >> $GITHUB_OUTPUT
            echo "service=polymarket-prod-service" >> $GITHUB_OUTPUT
          else
            echo "name=dev"     >> $GITHUB_OUTPUT
            echo "cluster=polymarket-dev-cluster"  >> $GITHUB_OUTPUT
            echo "service=polymarket-dev-service"  >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.name == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure EC2 instance is running
        run: |
          ASG="polymarket-${{ steps.env.outputs.name }}-ecs-asg"
          REGION="${{ secrets.AWS_REGION }}"

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:autoscaling:groupName,Values=$ASG" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text --region $REGION)

          if [[ -z "$INSTANCE_ID" || "$INSTANCE_ID" == "None" ]]; then
            echo "No instance found — scaling up ASG"
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name $ASG --min-size 1 --desired-capacity 1 \
              --region $REGION
            sleep 60
            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:aws:autoscaling:groupName,Values=$ASG" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text --region $REGION)
          fi

          STATE=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text --region $REGION)

          if [[ "$STATE" == "stopped" ]]; then
            echo "Starting instance $INSTANCE_ID..."
            aws ec2 start-instances --instance-ids $INSTANCE_ID --region $REGION
            aws ec2 wait instance-running --instance-ids $INSTANCE_ID --region $REGION
            aws autoscaling exit-standby \
              --instance-ids $INSTANCE_ID \
              --auto-scaling-group-name $ASG \
              --region $REGION || true
          fi

          echo "Waiting for ECS agent to register..."
          for i in $(seq 1 12); do
            COUNT=$(aws ecs list-container-instances \
              --cluster polymarket-${{ steps.env.outputs.name }}-cluster \
              --query 'length(containerInstanceArns)' --output text --region $REGION)
            [[ "$COUNT" -ge 1 ]] && echo "ECS agent ready" && break
            echo "Attempt $i/12 — waiting 15s..."
            sleep 15
          done

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Build and push collector
        id: collector
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/collector:$IMAGE_TAG \
            ./src/collector
          docker push $ECR_REGISTRY/collector:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/collector:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build and push trade_engine
        id: trade_engine
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/trade_engine:$IMAGE_TAG \
            -f src/trade_engine/Dockerfile \
            .
          docker push $ECR_REGISTRY/trade_engine:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/trade_engine:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Substitute ARN placeholders in task definition
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
          ENV_NAME: ${{ steps.env.outputs.name }}
        run: |
          cp infra/task-definition-${ENV_NAME}.json task-definition.json
          sed -i "s/{{ACCOUNT_ID}}/${ACCOUNT_ID}/g" task-definition.json

      - name: Render task definition — collector image
        id: render-collector
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: collector
          image: ${{ steps.collector.outputs.image }}

      - name: Render task definition — trade_engine image
        id: render-trade-engine
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-collector.outputs.task-definition }}
          container-name: trade_engine
          image: ${{ steps.trade_engine.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-trade-engine.outputs.task-definition }}
          service: ${{ steps.env.outputs.service }}
          cluster: ${{ steps.env.outputs.cluster }}
          wait-for-service-stability: true
