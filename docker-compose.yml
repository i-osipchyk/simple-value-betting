services:
  collector:
    build: ./collector
    volumes:
      - ./data:/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /data/raw_data.db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  model:
    build: ./model
    volumes:
      - ./data:/data
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      collector:
        condition: service_healthy

  analysis:
    build: ./analysis
    volumes:
      - ./data:/data
    env_file: .env
    restart: unless-stopped
    depends_on:
      collector:
        condition: service_healthy

  model_sl:
    build:
      context: .
      dockerfile: model_sl/Dockerfile
    volumes:
      - ./data:/data
    env_file: .env
    restart: unless-stopped
    depends_on:
      collector:
        condition: service_healthy

  analysis_sl:
    build:
      context: .
      dockerfile: analysis_sl/Dockerfile
    volumes:
      - ./data:/data
    env_file: .env
    restart: unless-stopped
    depends_on:
      collector:
        condition: service_healthy
